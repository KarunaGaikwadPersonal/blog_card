<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Blog preview card</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: hsl(47, 88%, 63%);
      font-family: Arial, sans-serif;
    }

    main {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .card {
      width: 320px;
      background: #fff;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid #000;
      box-shadow: 8px 8px 0 #000;
    }

    .card img {
      width: 100%;
      border-radius: 12px;
    }

    .tag {
      display: inline-block;
      background: hsl(47, 88%, 63%);
      padding: 6px 10px;
      margin-top: 12px;
      font-weight: bold;
      border-radius: 4px;
    }

    .date {
      font-size: 14px;
      margin: 10px 0;
    }

    h1 {
      font-size: 20px;
      margin: 10px 0;
      cursor: pointer;
    }

    h1:hover {
      color: hsl(47, 88%, 63%);
    }

    p {
      font-size: 14px;
      color: #555;
    }

    .author {
      display: flex;
      align-items: center;
      margin-top: 16px;
    }

    .author img {
      width: 32px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .author span {
      font-weight: bold;
    }

    .attribution {
      font-size: 0.75rem;
      text-align: center;
      margin: 20px 0;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
      text-decoration: none;
      font-weight: 500;
    }

    .attribution a:hover,
    .attribution a:focus-visible {
      text-decoration: underline;
      outline: 2px solid hsl(228, 45%, 44%);
      outline-offset: 2px;
    }
  </style>
</head>

<body>

  <main>
    <article class="card">
      <img src="./assets/images/illustration-article.svg" alt="Article illustration">

      <div class="tag">Learning</div>

      <div class="date">Published 21 Dec 2023</div>

      <h1 tabindex="0">HTML & CSS foundations</h1>

      <p>
        These languages are the backbone of every website, defining structure, content, and presentation.
      </p>

      <div class="author">
        <img src="./assets/images/image-avatar.webp" alt="Greg Hooper">
        <span>Greg Hooper</span>
      </div>
    </article>
  </main>

  <footer class="attribution">
    Challenge by 
    <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by 
    <a href="#">Karuna Gaikwad</a>.
  </footer>

</body>
</html>
